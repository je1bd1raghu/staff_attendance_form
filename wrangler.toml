# ── Secrets (never put real values here) ──────────────────────────────────────
# Set each secret via CLI before deploying:
#
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_ANON_KEY
#   wrangler secret put ADMIN_PIN
#
# Get these from: Supabase dashboard → Settings → API
#   SUPABASE_URL      → Project URL  (e.g. https://xxxx.supabase.co)
#   SUPABASE_ANON_KEY → anon / public key
#   ADMIN_PIN         → your chosen admin PIN
#
# Secrets are encrypted at rest in Cloudflare and injected into env at runtime.
# Do NOT add a [vars] block for these — vars are plaintext in the dashboard.
